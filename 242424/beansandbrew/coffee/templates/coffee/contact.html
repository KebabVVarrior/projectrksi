{% load static %}
<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Контакты | Beans & Brew</title>
    <link rel="stylesheet" href="{% static 'coffee/style.css' %}">
    <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@600;700&family=Montserrat:wght@300;400;600&display=swap" rel="stylesheet">
</head>
<body class="dark-bg">
<header>
    <nav class="container">
        <a href="{% url 'index' %}" class="logo">B<span>&</span>B</a>
        <ul class="nav-links">
            <li><a href="{% url 'index' %}">Главная</a></li>
            <li><a href="{% url 'menu' %}">Меню</a></li>
            <li><a href="{% url 'contact' %}" class="active">Контакты</a></li>
            {% if user.is_authenticated %}
                <li><a href="{% url 'logout' %}">Выйти</a></li>
            {% else %}
                <li><a href="{% url 'login' %}">Вход</a></li>
                <li><a href="{% url 'register' %}">Регистрация</a></li>
            {% endif %}
        </ul>
    </nav>
</header>

<main class="container page-content">
    <div class="contact-wrap">
        <div class="contact-info-block">
            <span class="subtitle">Ждем вас</span>
            <h2 class="section-title">Пространство B&B</h2>
            <div class="info-details">
                <p>ул. Кофейная панорама, 12, Центр</p>
                <p>Ежедневно: 08:00 — 23:00</p>
                <p class="phone">+7 (999) B&B-COFFEE</p>
            </div>
        </div>
        <div class="contact-form-block">
            <form id="contactForm" class="premium-form">
                <div class="form-group">
                    <input type="text" id="name" name="name" required placeholder=" ">
                    <label for="name">Ваше имя</label>
                </div>
                <div class="form-group">
                    <textarea id="message" name="message" rows="4" required placeholder=" "></textarea>
                    <label for="message">Ваш запрос (или бронь столика)</label>
                </div>
                <button type="submit" class="btn-premium">Отправить</button>
            </form>
        </div>
    </div>
</main>

<script src="{% static 'coffee/script.js' %}"></script>
</body>
</html>
