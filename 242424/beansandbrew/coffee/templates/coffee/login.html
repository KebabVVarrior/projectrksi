{% load static %}
<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Вход | Beans & Brew</title>
    <link rel="stylesheet" href="{% static 'coffee/style.css' %}">
</head>
<body class="dark-bg">
<header>
    <nav class="container">
        <a href="{% url 'index' %}" class="logo">B<span>&</span>B</a>
    </nav>
</header>

<main class="container page-content">
    <div class="contact-wrap">
        <div class="contact-form-block">
            <form method="post" class="premium-form">
                {% csrf_token %}
                <h2 class="section-title">Вход</h2>
                <div class="form-group">
                    <input type="text" name="username" required placeholder=" ">
                    <label>Имя пользователя</label>
                </div>
                <div class="form-group">
                    <input type="password" name="password" required placeholder=" ">
                    <label>Пароль</label>
                </div>
                <button type="submit" class="btn-premium">Войти</button>
            </form>
            <p>Нет аккаунта? <a href="{% url 'register' %}">Зарегистрироваться</a></p>
        </div>
    </div>
</main>

<script src="{% static 'coffee/script.js' %}"></script>
</body>
</html>
